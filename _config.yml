
プライバシーポリシー
最終更新日：2026年7月12日

1. はじめに
BodyMemo（以下「本アプリ」）は、ユーザーの皆様のプライバシーを尊重し、個人情報の保護に努めます。本プライバシーポリシーは、本アプリが収集する情報とその利用方法についてご説明します。
2. 収集する情報
本アプリは、食事記録・運動記録・目標カロリーなどの健康データをお客様のデバイス内にのみ保存します。これらのデータは外部サーバーへ送信されることはなく、第三者と共有されることもありません。
3. データの保存場所
本アプリが収集するすべてのデータは、お使いのデバイスのローカルストレージ（UserDefaults およびアプリのサンドボックス内）に保存されます。クラウドへのアップロードやネットワーク通信は一切行いません。
4. 第三者への提供
本アプリは、食事・運動などの健康データを第三者へ提供・販売・貸与いたしません。ただし、広告配信のため Google Mobile Ads（Google AdMob）を使用しており、Google に広告配信に必要な情報が送信される場合があります。詳細は Google のプライバシーポリシーをご確認ください。
5. データの削除
記録したデータはアプリ内の各画面から削除できます。また、デバイスからアプリをアンインストールすることで、保存されたすべてのデータが削除されます。
6. お子様のプライバシー
本アプリは13歳未満のお子様を対象としておらず、意図的に13歳未満の方から個人情報を収集することはありません。
7. プライバシーポリシーの変更
本ポリシーは必要に応じて更新される場合があります。変更があった場合は、アプリのアップデートを通じてお知らせします。
8. お問い合わせ
プライバシーポリシーに関するご質問・ご意見は、App Store のサポートページよりお問い合わせください。
